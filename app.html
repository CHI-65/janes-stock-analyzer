    try { localStorage.setItem("__t", "1"); localStorage.removeItem("__t"); ok = true; } catch (e) { ok = false; }

      get: function (k) {
        try { return Promise.resolve(ok ? localStorage.getItem(key(k)) : (mem[k] || null)); }
        catch (e) { return Promise.resolve(mem[k] || null); }
      },
      set: function (k, v) {
        try { if (ok) localStorage.setItem(key(k), v); else mem[k] = v; }
        catch (e) { mem[k] = v; }
        return Promise.resolve();
      },
      delete: function (k) {
        try { if (ok) localStorage.removeItem(key(k)); else delete mem[k]; }
        catch (e) { delete mem[k]; }
        return Promise.resolve();
      },
    };
  })();
</script>

/* \u2014\u2014\u2014 iPhone / iPad polish \u2014\u2014\u2014 */
* { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
button, input { touch-action: manipulation; }
button { min-height: 44px; } /* Apple's minimum comfortable tap target */
.screen {
  min-height: 100vh;
  min-height: 100dvh; /* iOS Safari: tracks the real visible area as the toolbar collapses */
  padding-left: max(16px, env(safe-area-inset-left));
  padding-right: max(16px, env(safe-area-inset-right));
}
.screen-welcome { padding-bottom: max(32px, env(safe-area-inset-bottom)); }
.screen-analyzer { padding-bottom: calc(60px + env(safe-area-inset-bottom)); }
@media (max-width: 640px) {
